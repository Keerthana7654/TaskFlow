# Test configuration — uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:taskflow_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests (DDL managed by Hibernate)
spring.flyway.enabled=false

# JWT
jwt.secret=test-secret-key-at-least-32-characters-long-for-tests
jwt.expiration=3600000

# CORS
app.cors.allowed-origins=http://localhost:3000

logging.level.com.taskflow=WARN
